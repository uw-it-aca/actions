name: 'Container Vulnerability Scan'

description: >
  Scan container image for security vulnerabilities and upload as sarif to
  GitHub security tab. Note that sarif upload only works for public
  repositories, due to licensing restrictions.

inputs:
  image_tag:
    description: 'Full image reference to scan (name:tag)'
    required: true
  severity:
    description: 'Vulnerability severities to report'
    required: false
    default: 'HIGH,CRITICAL'
  upload_results:
    description: 'Whether to upload results to GitHub Security tab'
    required: false
    default: 'true'
  ignorefile:
    description: 'Path to Trivy ignore file (defaults to .trivyignore.yaml if it exists)'
    required: false
    default: ''

outputs:
  vulnerabilities_found:
    description: 'Whether vulnerabilities were found (true/false)'
    value: ${{ steps.scan-results.outputs.vulnerabilities_found }}
  results_file:
    description: 'Path to the vulnerability scan results file'
    value: ${{ steps.scan-results.outputs.results_file }}

runs:
  using: 'composite'
  
  steps:
    - name: Check for Trivy ignore file
      id: check-ignorefile
      shell: bash
      run: |
        ignorefile="${{ inputs.ignorefile }}"
        
        # If no ignorefile is specified, check for default .trivyignore.yaml
        if [[ -z "$ignorefile" ]]; then
          if [[ -f ".trivyignore.yaml" ]]; then
            ignorefile=".trivyignore.yaml"
            echo "Found default .trivyignore.yaml file"
          fi
        fi
        
        # Check if the specified ignore file exists
        if [[ -n "$ignorefile" ]]; then
          if [[ -f "$ignorefile" ]]; then
            echo "ignorefile_path=$ignorefile" >> $GITHUB_OUTPUT
            echo "use_ignorefile=true" >> $GITHUB_OUTPUT
            echo "Using Trivy ignore file: $ignorefile"
          else
            echo "Warning: Specified ignore file '$ignorefile' not found, proceeding without it"
            echo "ignorefile_path=" >> $GITHUB_OUTPUT
            echo "use_ignorefile=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "ignorefile_path=" >> $GITHUB_OUTPUT
          echo "use_ignorefile=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Run Trivy vulnerability scanner (with ignorefile)
      if: steps.check-ignorefile.outputs.use_ignorefile == 'true'
      id: scan-with-ignore
      uses: aquasecurity/trivy-action@v0.35.0
      with:
        image-ref: ${{ inputs.image_tag }}
        severity: ${{ inputs.severity }}
        format: sarif
        output: 'trivy-results.sarif'
      env:
        TRIVY_IGNOREFILE: ${{ steps.check-ignorefile.outputs.ignorefile_path }}
        
    - name: Run Trivy vulnerability scanner (without ignorefile)
      if: steps.check-ignorefile.outputs.use_ignorefile == 'false'
      id: scan-without-ignore
      uses: aquasecurity/trivy-action@v0.35.0
      with:
        image-ref: ${{ inputs.image_tag }}
        severity: ${{ inputs.severity }}
        format: sarif
        output: 'trivy-results.sarif'
        
    - name: Check scan results
      if: success()
      id: scan-results
      shell: bash
      run: |
        if [[ -f "trivy-results.sarif" ]]; then
          echo "results_file=trivy-results.sarif" >> $GITHUB_OUTPUT

          # Map severity labels to their CVSS lower bounds.
          # We take the lowest bound among all configured severities so that
          # the >= comparison catches everything the user asked for.
          # e.g. "HIGH,CRITICAL" -> min(7.0, 9.0) -> 7.0
          severity_threshold=11.0  # start above max so any valid match lowers it
          IFS=',' read -ra severity_list <<< "${{ inputs.severity }}"
          for sev in "${severity_list[@]}"; do
            case "${sev^^}" in
              CRITICAL) bound=9.0 ;;
              HIGH)     bound=7.0 ;;
              MEDIUM)   bound=4.0 ;;
              LOW)      bound=0.0 ;;
              *)
                echo "Warning: unrecognized severity '${sev}', skipping" >&2
                continue
                ;;
            esac
            # Use awk for float comparison since bash only does integers
            if awk -v a="$bound" -v b="$severity_threshold" 'BEGIN { exit !(a < b) }'; then
              severity_threshold="$bound"
            fi
          done

          if [[ "$severity_threshold" == "11.0" ]]; then
            echo "Warning: no valid severities parsed from '${{ inputs.severity }}', defaulting to HIGH (7.0)" >&2
            severity_threshold=7.0
          fi

          echo "Using security-severity threshold: >= ${severity_threshold}"

          # security-severity lives on tool.driver.rules[], not results[]
          raw_count=$(jq --argjson threshold "$severity_threshold" '
            [
              .runs[]?.tool.driver.rules[]?.properties?."security-severity" // empty
              | tonumber
              | select(. >= $threshold)
            ] | length
          ' "trivy-results.sarif" 2>/dev/null)

          # Sanitize: fallback to 0 if empty or non-numeric
          vuln_count=${raw_count:-0}
          if ! [[ "$vuln_count" =~ ^[0-9]+$ ]]; then
            echo "Warning: unexpected jq output '${vuln_count}', defaulting to 0" >&2
            vuln_count=0
          fi

          if [[ "$vuln_count" -gt 0 ]]; then
            echo "vulnerabilities_found=true" >> $GITHUB_OUTPUT
            echo "Found $vuln_count vulnerabilities with security-severity >= ${severity_threshold}"
          else
            echo "vulnerabilities_found=false" >> $GITHUB_OUTPUT
            echo "No vulnerabilities found with security-severity >= ${severity_threshold}"
          fi
        else
          echo "Warning: trivy-results.sarif not found" >&2
          echo "results_file=" >> $GITHUB_OUTPUT
          echo "vulnerabilities_found=false" >> $GITHUB_OUTPUT
        fi
      
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      if: success() && inputs.upload_results == 'true' && hashFiles('trivy-results.sarif') != ''
      with:
        sarif_file: 'trivy-results.sarif'
